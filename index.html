<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Age Calculator</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: "Segoe UI", sans-serif;
        }

        .calculator-card {
            width: 100%;
            max-width: 500px;
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }

        .header {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            text-align: center;
            padding: 30px 20px;
        }

        .header i {
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
        }

        .card-body {
            padding: 30px;
        }

        .form-control {
            height: 55px;
            border-radius: 12px;
        }

        .btn-calculate {
            height: 55px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
        }

        .result-box {
            display: none;
            margin-top: 25px;
            background: #f8fafc;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .result-box h2 {
            color: #2563eb;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-box p {
            margin: 0;
            color: #64748b;
        }

        @media (max-width: 576px) {
            .header h2 {
                font-size: 1.5rem;
            }

            .header i {
                font-size: 40px;
            }

            .card-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="card calculator-card">

    <div class="header">
        <i class="bi bi-calendar-check-fill"></i>
        <h2>Age Calculator</h2>
        <p class="mb-0">Calculate your age instantly</p>
    </div>

    <div class="card-body">

        <label class="form-label fw-semibold">
            Date of Birth
        </label>

        <input type="date" id="dob" class="form-control mb-3">

        <button class="btn btn-primary btn-calculate w-100" onclick="calculateAge()">
            <i class="bi bi-calculator me-2"></i>
            Calculate Age
        </button>

        <div class="result-box" id="resultBox">
            <h2 id="ageYears">0 Years</h2>
            <p id="ageDetails"></p>
        </div>

    </div>

</div>

<script>
function calculateAge() {

    const dob = document.getElementById("dob").value;

    if (!dob) {
        alert("Please select your Date of Birth");
        return;
    }

    const birthDate = new Date(dob);
    const today = new Date();

    let years = today.getFullYear() - birthDate.getFullYear();
    let months = today.getMonth() - birthDate.getMonth();
    let days = today.getDate() - birthDate.getDate();

    if (days < 0) {
        months--;
        const lastMonth = new Date(
            today.getFullYear(),
            today.getMonth(),
            0
        ).getDate();
        days += lastMonth;
    }

    if (months < 0) {
        years--;
        months += 12;
    }

    document.getElementById("ageYears").innerHTML =
        years + " Years";

    document.getElementById("ageDetails").innerHTML =
        months + " Months & " + days + " Days";

    document.getElementById("resultBox").style.display = "block";
}
</script>

</body>
</html>
