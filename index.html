<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .age-card {
            width: 100%;
            max-width: 500px;
            border: none;
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .card-header-custom {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            text-align: center;
            padding: 30px;
        }

        .card-header-custom i {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .form-control {
            height: 55px;
            border-radius: 12px;
        }

        .btn-calculate {
            height: 55px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
        }

        .result-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            background: #f8fafc;
            text-align: center;
        }

        .age-value {
            font-size: 2rem;
            font-weight: bold;
            color: #2563eb;
        }

        .age-label {
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="card age-card">

    <div class="card-header-custom">
        <i class="fas fa-calendar-check"></i>
        <h3 class="mb-0">Age Calculator</h3>
        <small>Calculate your age instantly</small>
    </div>

    <div class="card-body p-4">

        <label class="form-label fw-semibold">
            Date of Birth
        </label>

<input type="text"
       id="dob"
       class="form-control mb-3"
       placeholder="DD/MM/YYYY">
        <button class="btn btn-primary btn-calculate w-100"
                onclick="calculateAge()">
            <i class="fas fa-calculator me-2"></i>
            Calculate Age
        </button>

        <div class="result-box" id="resultBox">
            <div class="age-value" id="ageResult"></div>
            <div class="age-label">Years Old</div>
        </div>

    </div>

</div>

<script>
function calculateAge() {
    const dob = document.getElementById("dob").value;

    if (!dob) {
        alert("Please select your Date of Birth");
        return;
    }

    const birthDate = new Date(dob);
    const today = new Date();

    let age = today.getFullYear() - birthDate.getFullYear();

    const monthDifference =
        today.getMonth() - birthDate.getMonth();

    if (
        monthDifference < 0 ||
        (monthDifference === 0 &&
         today.getDate() < birthDate.getDate())
    ) {
        age--;
    }

    document.getElementById("ageResult").innerHTML = age;
    document.getElementById("resultBox").style.display = "block";
}
</script>

</body>
</html>
